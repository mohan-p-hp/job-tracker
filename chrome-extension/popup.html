<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      padding: 16px;
      background: #fff;
      color: #1a1a1a;
    }

    .header {
      font-size: 15px;
      font-weight: 600;
      color: #185FA5;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 0.5px solid #eee;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #888;
      margin-bottom: 3px;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    input,
    select {
      width: 100%;
      padding: 7px 10px;
      border: 0.5px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      color: #1a1a1a;
    }

    input:focus,
    select:focus {
      border-color: #185FA5;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .btn-save {
      flex: 1;
      padding: 8px;
      background: #185FA5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-save:hover {
      background: #0C447C;
    }

    .btn-save:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      padding: 6px;
      border-radius: 6px;
      display: none;
    }

    .status.success {
      background: #EAF3DE;
      color: #3B6D11;
      display: block;
    }

    .status.error {
      background: #FCEBEB;
      color: #A32D2D;
      display: block;
    }

    .no-job {
      font-size: 13px;
      color: #888;
      text-align: center;
      padding: 20px 0;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="header">JobTracker Capture</div>
  <div id="form-area">
    <label>Company</label>
    <input id="company" type="text" placeholder="Company name" />
    <label>Job title</label>
    <input id="title" type="text" placeholder="Job title" />
    <label>Platform</label>
    <select id="platform">
      <option>LinkedIn</option>
      <option>Indeed</option>
      <option>Naukri</option>
      <option>Other</option>
    </select>
    <label>Status</label>
    <select id="status">
      <option>Applied</option>
      <option>Interviewing</option>
      <option>Offer</option>
      <option>Rejected</option>
      <option>Ghosted</option>
    </select>
    <div class="btn-row">
      <button class="btn-save" id="save-btn">Save to JobTracker</button>
    </div>
    <div class="status" id="status-msg"></div>
  </div>
  <div class="no-job" id="no-job" style="display:none">
    Navigate to a job listing on LinkedIn, Indeed, or Naukri, then click this icon to capture it.
  </div>
  <script src="popup.js"></script>
</body>

</html>
